<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JianYing Draft API — OpenAPI 文档</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    /* ── 顶部工具栏 ── */
    .toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 12px 24px; background: #1b1b1b; color: #e0e0e0;
      border-bottom: 1px solid #333;
    }
    .toolbar h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
    .toolbar .version { font-size: 12px; color: #888; margin-left: -4px; }
    .toolbar .spacer { flex: 1; }

    .toolbar input, .toolbar select, .toolbar button {
      padding: 6px 12px; border: 1px solid #444; border-radius: 4px;
      background: #2a2a2a; color: #e0e0e0; font-size: 13px;
    }
    .toolbar input { width: 320px; }
    .toolbar input:focus { border-color: #49cc90; outline: none; }
    .toolbar button {
      cursor: pointer; background: #49cc90; color: #1b1b1b;
      font-weight: 600; border-color: #49cc90;
    }
    .toolbar button:hover { background: #3ab57a; }
    .toolbar select { cursor: pointer; }

    /* ── Swagger UI 容器 ── */
    #swagger-ui { min-height: calc(100vh - 57px); }
    #swagger-ui .topbar { display: none; }

    /* ── 加载遮罩 ── */
    .loading-overlay {
      display: flex; align-items: center; justify-content: center;
      height: 60vh; color: #888; font-size: 16px;
    }
    .loading-overlay .spinner {
      width: 24px; height: 24px; border: 3px solid #333;
      border-top-color: #49cc90; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="toolbar">
  <h1>🎬 JianYing Draft API</h1>
  <span class="version">v0.2.0 · OpenAPI 3.1</span>
  <span class="spacer"></span>
  <label for="specSource">数据源:</label>
  <select id="specSource">
    <option value="url">远程 URL</option>
    <option value="local">本地 JSON</option>
  </select>
  <input id="specUrl" type="text"
         value="/openapi.json"
         placeholder="输入 OpenAPI JSON URL 或粘贴 JSON 内容">
  <button id="loadBtn" onclick="loadSpec()">📄 加载</button>
</div>

<div id="swagger-ui">
  <div class="loading-overlay">
    <div class="spinner"></div> 加载 OpenAPI 规范中...
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>

<script>
const DEFAULT_SPEC_URL = '/openapi.json';
const FALLBACK_SPEC = {
  openapi: "3.1.0",
  info: { title: "JianYing Draft API", version: "0.2.0", description: "剪映草稿自动化 REST API" },
  paths: { "/health": { get: { summary: "健康检查", responses: { "200": { description: "OK" } } } } }
};

function getSpecSource() {
  return document.getElementById('specSource').value;
}

function getSpecInput() {
  return document.getElementById('specUrl').value.trim();
}

function loadSpec() {
  const container = document.getElementById('swagger-ui');
  container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div> 加载中...</div>';

  const source = getSpecSource();
  const input = getSpecInput();

  if (source === 'local') {
    try {
      const spec = JSON.parse(input);
      renderSpec(spec);
    } catch (e) {
      container.innerHTML = `<div class="loading-overlay" style="color:#f44;">JSON 解析失败: ${e.message}</div>`;
    }
    return;
  }

  // 远程 URL 加载
  const url = input || DEFAULT_SPEC_URL;
  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}: ${r.statusText}`);
      return r.json();
    })
    .then(spec => renderSpec(spec))
    .catch(err => {
      console.error('加载 OpenAPI 规范失败:', err);
      container.innerHTML = `<div class="loading-overlay" style="color:#e88;">
        <div>
          <p>无法从 <code>${url}</code> 加载规范</p>
          <p style="margin-top:8px;font-size:14px;">${err.message}</p>
          <p style="margin-top:12px;font-size:13px;">
            提示: 尝试切换到 <b>本地 JSON</b> 模式并粘贴 OpenAPI JSON 内容
          </p>
        </div>
      </div>`;
    });
}

function renderSpec(spec) {
  const container = document.getElementById('swagger-ui');
  container.innerHTML = '';
  SwaggerUIBundle({
    spec: spec,
    dom_id: '#swagger-ui',
    presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
    layout: "BaseLayout",
    deepLinking: true,
    docExpansion: "list",
    defaultModelsExpandDepth: 2,
    defaultModelExpandDepth: 2,
    filter: true,
    showExtensions: true,
    showCommonExtensions: true,
    tryItOutEnabled: true,
    syntaxHighlight: { theme: "monokai" }
  });
}

// 监听数据源切换
document.getElementById('specSource').addEventListener('change', function() {
  const input = document.getElementById('specUrl');
  const btn = document.getElementById('loadBtn');
  if (this.value === 'url') {
    input.type = 'text';
    input.placeholder = '输入 OpenAPI JSON URL';
    input.value = DEFAULT_SPEC_URL;
    btn.textContent = '📄 加载';
  } else {
    input.type = 'text';
    input.placeholder = '在此粘贴完整的 OpenAPI JSON...';
    input.value = '';
    btn.textContent = '📋 渲染';
  }
});

// 页面加载时自动加载默认 URL
window.addEventListener('DOMContentLoaded', () => {
  const savedSource = localStorage.getItem('swagger-source') || 'url';
  const savedUrl = localStorage.getItem('swagger-url') || DEFAULT_SPEC_URL;
  document.getElementById('specSource').value = savedSource;
  document.getElementById('specUrl').value = savedUrl;
  if (savedSource === 'local') {
    document.getElementById('specUrl').placeholder = '在此粘贴完整的 OpenAPI JSON...';
  }
  loadSpec();
});

// 自动保存设置
window.addEventListener('beforeunload', () => {
  localStorage.setItem('swagger-source', getSpecSource());
  localStorage.setItem('swagger-url', getSpecInput());
});
</script>
</body>
</html>
